<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor Dashboard - CapitaScope Platform</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <div class="nav-left">
              
                    <span class="brand-name">CapitaScope</span>
                </div>
                <ul class="nav-links">
                    <li><a href="#profile">My Profile</a></li>
                    <li><a href="#startups">Browse Startups</a></li>
                    <li><a href="#meetings">My Meetings</a></li>
                    <li><a href="#requests">My Requests</a></li>
                    <li><a href="index.html" id="logout">Logout</a></li>
                </ul>
            </div>
        </nav>

    <main>
        <div class="dashboard-container">

                <div id="profileContent"></div>
            </div>

            <div id="startups" class="dashboard-section">
                <h2>Browse Startups</h2>
                <div id="startupsContent"></div>
            </div>

            <div id="meetings" class="dashboard-section">
                <h2>My Meetings</h2>
                <div id="meetingsContent"></div>
            </div>

            <div id="requests" class="dashboard-section">
                <h2>My Meeting Requests</h2>
                <div id="requestsContent"></div>
            </div>
        </div>
    </main>

 <script src="js/investor-dashboard.js"></script>

</html>
